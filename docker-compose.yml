services:
  postgres:
    image: postgres:16
    container_name: sistema_authservice_postgres
    restart: always
    environment:
      POSTGRES_DB: authservice
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
    ports:
    - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d authservice"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: production
    container_name: sistema_authservice_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=authservice;Username=root;Password=admin;Port=5432"
      JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      CloudinarySettings__CloudName: ${CLOUDINARY_CLOUD_NAME}
      CloudinarySettings__ApiKey: ${CLOUDINARY_API_KEY}
      CloudinarySettings__ApiSecret: ${CLOUDINARY_API_SECRET}
      CloudinarySettings__BaseUrl: ${CLOUDINARY_BASE_URL}
      ResendSettings__ApiKey: ${RESEND_API_KEY}
      ResendSettings__FromEmail: ${RESEND_FROM_EMAIL}
    ports:
      - "5127:5127"

volumes:
  postgres_data: